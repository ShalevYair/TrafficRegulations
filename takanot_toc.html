<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תקנות התעבורה - תוכן עניינים</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #60a5fa;
            --primary-dark: #93bbfd;
            --secondary: #38bdf8;
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-sub: #94a3b8;
            --border-light: #334155;
            --header-bg: rgba(30, 41, 59, 0.95);
        }

        body.light-mode {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #0ea5e9;
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --text-sub: #475569;
            --border-light: #e2e8f0;
            --header-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Heebo', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            padding: 15px 40px;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.3s, border-color 0.3s;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dark-mode-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .dark-mode-btn:hover {
            background: var(--primary);
            color: white;
        }

        .source-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Heebo', sans-serif;
            color: var(--secondary);
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .source-btn:hover {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }

        .content {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px 60px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: var(--panel-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.85rem;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-chip strong {
            color: var(--primary);
        }

        #toc-container {
            background: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: background 0.3s, border-color 0.3s;
        }

        .toc-header {
            padding: 24px 30px 20px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toc-header h2 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-dark);
        }

        .toc-count {
            font-size: 0.8rem;
            color: var(--text-sub);
            background: var(--bg-color);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
        }

        .toc-list {
            padding: 10px 0;
        }

        .toc-entry {
            display: flex;
            align-items: baseline;
            gap: 0;
            border-bottom: 1px solid transparent;
            transition: background 0.15s;
        }

        .toc-entry:hover {
            background: rgba(96, 165, 250, 0.06);
        }

        .toc-entry:last-child {
            border-bottom: none;
        }

        .toc-entry a {
            display: flex;
            align-items: baseline;
            gap: 10px;
            width: 100%;
            text-decoration: none;
            color: inherit;
            padding: 9px 30px;
        }

        /* Level 1 – חלקים */
        .toc-entry[data-level="1"] {
            border-bottom: 1px solid var(--border-light);
            margin-top: 4px;
        }
        .toc-entry[data-level="1"] a {
            padding: 14px 30px 12px;
        }
        .toc-entry[data-level="1"] .toc-num {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 32px;
        }
        .toc-entry[data-level="1"] .toc-text {
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary-dark);
        }

        /* Level 2 – פרקים */
        .toc-entry[data-level="2"] a {
            padding: 8px 30px 8px 50px;
        }
        .toc-entry[data-level="2"] .toc-num {
            color: var(--secondary);
            font-size: 0.82rem;
            min-width: 46px;
            font-weight: 500;
        }
        .toc-entry[data-level="2"] .toc-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Level 3+ – סימנים */
        .toc-entry[data-level="3"] a,
        .toc-entry[data-level="4"] a {
            padding: 6px 30px 6px 70px;
        }
        .toc-entry[data-level="3"] .toc-num,
        .toc-entry[data-level="4"] .toc-num {
            color: var(--text-sub);
            font-size: 0.78rem;
            min-width: 60px;
        }
        .toc-entry[data-level="3"] .toc-text,
        .toc-entry[data-level="4"] .toc-text {
            font-size: 0.88rem;
            color: var(--text-sub);
        }

        .toc-entry a:hover .toc-text {
            color: var(--primary);
        }

        .toc-dot {
            flex: 1;
            border-bottom: 1px dotted var(--border-light);
            margin: 0 6px 3px;
            min-width: 20px;
        }

        .toc-arrow {
            font-size: 0.75rem;
            color: var(--border-light);
            transition: color 0.15s;
        }
        .toc-entry a:hover .toc-arrow {
            color: var(--primary);
        }

        /* מצב טעינה */
        #loading-state {
            padding: 60px 30px;
            text-align: center;
            color: var(--text-sub);
        }

        .loader {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #error-state {
            padding: 60px 30px;
            text-align: center;
            color: #ef4444;
            display: none;
        }

        .search-bar {
            padding: 0 30px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .search-input {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 9px 14px;
            font-family: 'Heebo', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
            direction: rtl;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        .search-input::placeholder {
            color: var(--text-sub);
        }

        .no-results {
            padding: 40px;
            text-align: center;
            color: var(--text-sub);
            display: none;
        }

        .highlight {
            background: rgba(96, 165, 250, 0.25);
            border-radius: 3px;
            padding: 0 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>תקנות התעבורה — תוכן עניינים</h1>
        <div class="header-controls">
            <a class="source-btn"
               href="https://he.wikisource.org/wiki/%D7%AA%D7%A7%D7%A0%D7%95%D7%AA_%D7%94%D7%AA%D7%A2%D7%91%D7%95%D7%A8%D7%94"
               target="_blank">
               ↗ ויקיטקסט
            </a>
            <button class="dark-mode-btn" onclick="toggleDarkMode()" id="dark-mode-btn" title="מצב בהיר/כהה">&#9788;</button>
        </div>
    </div>

    <div class="content">
        <div class="stats-bar" id="stats-bar" style="display:none">
            <div class="stat-chip">סה"כ סעיפים: <strong id="stat-total">—</strong></div>
            <div class="stat-chip">חלקים: <strong id="stat-l1">—</strong></div>
            <div class="stat-chip">פרקים: <strong id="stat-l2">—</strong></div>
            <div class="stat-chip">סימנים: <strong id="stat-l3">—</strong></div>
        </div>

        <div id="toc-container">
            <div class="toc-header">
                <h2>📋 תוכן העניינים</h2>
                <span class="toc-count" id="toc-count-badge">טוען...</span>
            </div>

            <div id="loading-state">
                <div class="loader"></div>
                <p>שולף תוכן עניינים מויקיטקסט...</p>
            </div>

            <div id="error-state">
                <div style="font-size:2.5rem;margin-bottom:12px">⚠</div>
                <p id="error-msg">שגיאה בטעינה</p>
                <button onclick="loadTOC()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer;font-family:'Heebo',sans-serif;font-size:0.9rem;">נסה שוב</button>
            </div>

            <div id="toc-body" style="display:none">
                <div class="search-bar">
                    <input type="search" class="search-input" id="search-input"
                           placeholder="🔍 חיפוש בתוכן העניינים..."
                           oninput="filterTOC(this.value)" />
                </div>
                <div class="toc-list" id="toc-list"></div>
                <div class="no-results" id="no-results">לא נמצאו תוצאות</div>
            </div>
        </div>
    </div>

    <script>
        const WIKI_API  = 'https://he.wikisource.org/w/api.php';
        const WIKI_BASE = 'https://he.wikisource.org/wiki/%D7%AA%D7%A7%D7%A0%D7%95%D7%AA_%D7%94%D7%AA%D7%A2%D7%91%D7%95%D7%A8%D7%94';
        const PAGE_NAME = 'תקנות_התעבורה';

        let allEntries = [];   // שמור לצורך חיפוש

        async function loadTOC() {
            document.getElementById('loading-state').style.display = 'block';
            document.getElementById('error-state').style.display   = 'none';
            document.getElementById('toc-body').style.display       = 'none';
            document.getElementById('stats-bar').style.display      = 'none';
            document.getElementById('toc-count-badge').textContent  = 'טוען...';

            try {
                const url = `${WIKI_API}?action=parse&page=${encodeURIComponent(PAGE_NAME)}` +
                            `&prop=sections&format=json&origin=*`;
                const res  = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (data.error) throw new Error(data.error.info);

                const sections = data.parse.sections;
                renderTOC(sections);
            } catch (err) {
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('error-state').style.display   = 'block';
                document.getElementById('error-msg').textContent = err.message;
            }
        }

        function renderTOC(sections) {
            const list = document.getElementById('toc-list');
            list.innerHTML = '';
            allEntries = [];

            let counts = { 1: 0, 2: 0, 3: 0 };

            sections.forEach(sec => {
                const lvl    = parseInt(sec.toclevel);
                const text   = sec.line.replace(/<[^>]+>/g, '');   // הסר HTML tags
                const num    = sec.number;
                const anchor = sec.anchor;
                const href   = WIKI_BASE + '#' + anchor;

                if (lvl <= 3) counts[Math.min(lvl, 3)]++;

                const entry = document.createElement('div');
                entry.className = 'toc-entry';
                entry.dataset.level = Math.min(lvl, 4);
                entry.dataset.text  = text;

                entry.innerHTML = `
                    <a href="${href}" target="_blank">
                        <span class="toc-num">${num}</span>
                        <span class="toc-text">${text}</span>
                        <span class="toc-dot"></span>
                        <span class="toc-arrow">←</span>
                    </a>`;

                list.appendChild(entry);
                allEntries.push({ el: entry, text: text.toLowerCase() });
            });

            // עדכן סטטיסטיקות
            const total = sections.length;
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-l1').textContent    = counts[1];
            document.getElementById('stat-l2').textContent    = counts[2];
            document.getElementById('stat-l3').textContent    = counts[3];
            document.getElementById('toc-count-badge').textContent = `${total} סעיפים`;

            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('toc-body').style.display       = 'block';
            document.getElementById('stats-bar').style.display      = 'flex';
        }

        function filterTOC(query) {
            const q = query.trim().toLowerCase();
            const noResults = document.getElementById('no-results');
            let visible = 0;

            allEntries.forEach(({ el, text }) => {
                const match = !q || text.includes(q);
                el.style.display = match ? '' : 'none';

                // הדגשת חיפוש
                if (match && q) {
                    const textEl = el.querySelector('.toc-text');
                    const original = textEl.dataset.original || textEl.textContent;
                    textEl.dataset.original = original;
                    const idx = original.toLowerCase().indexOf(q);
                    if (idx >= 0) {
                        textEl.innerHTML =
                            original.slice(0, idx) +
                            `<mark class="highlight">${original.slice(idx, idx + q.length)}</mark>` +
                            original.slice(idx + q.length);
                    }
                } else {
                    const textEl = el.querySelector('.toc-text');
                    if (textEl.dataset.original) {
                        textEl.textContent = textEl.dataset.original;
                    }
                }

                if (match) visible++;
            });

            noResults.style.display = visible === 0 && q ? 'block' : 'none';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('dark-mode-btn').innerHTML = isLight ? '&#9790;' : '&#9788;';
        }

        document.addEventListener('DOMContentLoaded', loadTOC);
    </script>
</body>
</html>
